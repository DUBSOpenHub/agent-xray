<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="fireCore" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="40%" style="stop-color:#f97316"/>
      <stop offset="75%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="fireHot" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="30%" style="stop-color:#fbbf24"/>
      <stop offset="70%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="fireEmber" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="50%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78350f"/>
      <stop offset="50%" style="stop-color:#451a03"/>
      <stop offset="100%" style="stop-color:#1c0a00"/>
    </linearGradient>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="30%" style="stop-color:#b45309"/>
      <stop offset="70%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78716c"/>
      <stop offset="100%" style="stop-color:#44403c"/>
    </linearGradient>
    <linearGradient id="stoneDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#57534e"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="textFire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="50%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="textGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <filter id="fireGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#f97316" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ea580c" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#f97316" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="emberGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Colosseum arches background spanning the banner -->
  <g opacity="0.15" fill="url(#stoneDark)" stroke="url(#stoneGrad)" stroke-width="1.5">
    <!-- Arches across the top -->
    <path d="M0 60 L0 20 Q0 0 20 0 Q40 0 40 20 L40 60Z"/>
    <path d="M40 60 L40 20 Q40 0 60 0 Q80 0 80 20 L80 60Z"/>
    <path d="M720 60 L720 20 Q720 0 740 0 Q760 0 760 20 L760 60Z"/>
    <path d="M760 60 L760 20 Q760 0 780 0 Q800 0 800 20 L800 60Z"/>
    <!-- Bottom arches -->
    <path d="M0 280 L0 230 Q0 210 20 210 Q40 210 40 230 L40 280Z"/>
    <path d="M40 280 L40 230 Q40 210 60 210 Q80 210 80 230 L80 280Z"/>
    <path d="M80 280 L80 230 Q80 210 100 210 Q120 210 120 230 L120 280Z"/>
    <path d="M680 280 L680 230 Q680 210 700 210 Q720 210 720 230 L720 280Z"/>
    <path d="M720 280 L720 230 Q720 210 740 210 Q760 210 760 230 L760 280Z"/>
    <path d="M760 280 L760 230 Q760 210 780 210 Q800 210 800 230 L800 280Z"/>
  </g>
  <!-- Stone ledges -->
  <rect x="0" y="58" width="90" height="3" rx="1" fill="url(#stoneGrad)" opacity="0.2"/>
  <rect x="710" y="58" width="90" height="3" rx="1" fill="url(#stoneGrad)" opacity="0.2"/>
  <rect x="0" y="208" width="130" height="3" rx="1" fill="url(#stoneGrad)" opacity="0.2"/>
  <rect x="670" y="208" width="130" height="3" rx="1" fill="url(#stoneGrad)" opacity="0.2"/>

  <!-- Shield icon with fire (scaled) -->
  <g transform="translate(52, 12) scale(0.48)">
    <!-- Fire behind shield -->
    <g filter="url(#fireGlow)" opacity="0.85">
      <path d="M256 80 Q280 140 270 200 Q310 160 290 100 Q320 170 300 230
               Q340 180 310 120 Q350 200 320 270 L256 300 L192 270
               Q180 200 162 120 Q172 180 210 230 Q190 170 202 100
               Q230 160 242 200 Q232 140 256 80Z"
            fill="url(#fireCore)"/>
      <path d="M180 300 Q160 220 140 170 Q155 230 170 200 Q158 260 175 290Z"
            fill="url(#fireEmber)" opacity="0.7"/>
      <path d="M332 300 Q352 220 372 170 Q357 230 342 200 Q354 260 337 290Z"
            fill="url(#fireEmber)" opacity="0.7"/>
    </g>
    <!-- Inner hot flames -->
    <g filter="url(#fireGlow)" opacity="0.6">
      <path d="M256 130 Q272 170 265 210 Q290 180 280 150 Q300 190 285 240
               L256 260 L227 240 Q212 190 232 150 Q222 180 247 210 Q240 170 256 130Z"
            fill="url(#fireHot)"/>
    </g>
    <!-- Shield -->
    <g filter="url(#outerGlow)">
      <path d="M256 145 L390 205 L390 310 Q390 400 256 462 Q122 400 122 310 L122 205 Z"
            fill="url(#bronzeGrad)"/>
      <path d="M256 157 L380 213 L380 306 Q380 392 256 450 Q132 392 132 306 L132 213 Z"
            fill="url(#shieldGrad)"/>
      <path d="M256 170 L370 222 L370 300 Q370 380 256 436 Q142 380 142 300 L142 222 Z"
            fill="#92400e" opacity="0.15"/>
    </g>
    <!-- Rivets -->
    <g fill="#d97706" opacity="0.6">
      <circle cx="175" cy="225" r="4"/>
      <circle cx="337" cy="225" r="4"/>
      <circle cx="150" cy="290" r="4"/>
      <circle cx="362" cy="290" r="4"/>
    </g>
    <!-- Cross -->
    <g stroke="#b45309" stroke-width="2" fill="none" opacity="0.5">
      <line x1="256" y1="185" x2="256" y2="430"/>
      <line x1="148" y1="290" x2="364" y2="290"/>
    </g>
    <!-- Gladiator A -->
    <g transform="translate(256, 295)">
      <path d="M0 -55 L-38 45 L-24 45 L-16 20 L16 20 L24 45 L38 45 Z"
            fill="none" stroke="url(#fireHot)" stroke-width="4" stroke-linejoin="round"/>
      <line x1="-20" y1="8" x2="20" y2="8" stroke="#fbbf24" stroke-width="3.5"/>
      <path d="M0 -42 L-28 38 L-18 38 L-12 18 L12 18 L18 38 L28 38 Z"
            fill="url(#fireCore)" opacity="0.3"/>
      <circle cx="0" cy="-55" r="4" fill="#fbbf24"/>
      <circle cx="-38" cy="45" r="3.5" fill="#f97316"/>
      <circle cx="38" cy="45" r="3.5" fill="#f97316"/>
    </g>
    <!-- Hearts -->
    <g transform="translate(222, 382)">
      <path d="M8 3 C8 -1, 14 -3, 14 3 C14 8, 8 13, 8 13 C8 13, 2 8, 2 3 C2 -3, 8 -1, 8 3Z"
            fill="url(#heartGrad)" stroke="#166534" stroke-width="0.8"/>
    </g>
    <g transform="translate(248, 378)">
      <path d="M8 3 C8 -1, 14 -3, 14 3 C14 8, 8 13, 8 13 C8 13, 2 8, 2 3 C2 -3, 8 -1, 8 3Z"
            fill="url(#heartGrad)" stroke="#166534" stroke-width="1"/>
    </g>
    <g transform="translate(274, 382)">
      <path d="M8 3 C8 -1, 14 -3, 14 3 C14 8, 8 13, 8 13 C8 13, 2 8, 2 3 C2 -3, 8 -1, 8 3Z"
            fill="url(#heartGrad)" stroke="#166534" stroke-width="0.8"/>
    </g>
    <!-- Embers -->
    <g opacity="0.8">
      <circle cx="130" cy="120" r="2.5" fill="#fbbf24"/>
      <circle cx="382" cy="105" r="2" fill="#f97316"/>
      <circle cx="200" cy="70" r="1.8" fill="#fcd34d"/>
      <circle cx="310" cy="55" r="2.2" fill="#fb923c"/>
    </g>
  </g>

  <!-- Text section -->
  <g filter="url(#textGlow)">
    <!-- "AGENT" in fire gradient -->
    <text x="340" y="115" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
          font-size="72" fill="url(#textGold)" font-weight="800" letter-spacing="6">
      AGENT
    </text>
    <!-- "ARMOR" in fire gradient -->
    <text x="340" y="190" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
          font-size="72" fill="url(#textFire)" font-weight="800" letter-spacing="6">
      ARMOR
    </text>
  </g>

  <!-- Tagline -->
  <text x="344" y="222" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="15" fill="#d6d3d1" font-weight="400" letter-spacing="3" opacity="0.8">
    SCAN · UPGRADE · FULL HEARTS
  </text>

  <!-- Three hearts next to tagline -->
  <g transform="translate(622, 210)">
    <path d="M6 2.5 C6 -0.5, 10.5 -2, 10.5 2.5 C10.5 6.5, 6 10, 6 10 C6 10, 1.5 6.5, 1.5 2.5 C1.5 -2, 6 -0.5, 6 2.5Z"
          fill="url(#heartGrad)" stroke="none"/>
  </g>
  <g transform="translate(638, 210)">
    <path d="M6 2.5 C6 -0.5, 10.5 -2, 10.5 2.5 C10.5 6.5, 6 10, 6 10 C6 10, 1.5 6.5, 1.5 2.5 C1.5 -2, 6 -0.5, 6 2.5Z"
          fill="url(#heartGrad)" stroke="none"/>
  </g>
  <g transform="translate(654, 210)">
    <path d="M6 2.5 C6 -0.5, 10.5 -2, 10.5 2.5 C10.5 6.5, 6 10, 6 10 C6 10, 1.5 6.5, 1.5 2.5 C1.5 -2, 6 -0.5, 6 2.5Z"
          fill="url(#heartGrad)" stroke="none"/>
  </g>

  <!-- Fire accent line under tagline -->
  <line x1="340" y1="236" x2="680" y2="236" stroke="url(#fireCore)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="340" cy="236" r="2.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="680" cy="236" r="2.5" fill="#ef4444" opacity="0.6"/>

  <!-- Version badge -->
  <g transform="translate(340, 246)">
    <rect x="0" y="0" width="76" height="20" rx="10" fill="#451a03" stroke="#b45309" stroke-width="1" opacity="0.8"/>
    <text x="38" y="14" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace"
          font-size="10" fill="#fbbf24" font-weight="500">v1.0</text>
  </g>

  <!-- Zero dependencies badge -->
  <g transform="translate(426, 246)">
    <rect x="0" y="0" width="110" height="20" rx="10" fill="#14532d" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
    <text x="55" y="14" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace"
          font-size="10" fill="#4ade80" font-weight="500">0 dependencies</text>
  </g>

  <!-- Floating ember particles across banner -->
  <g opacity="0.6">
    <circle cx="300" cy="30" r="1.5" fill="#fbbf24"/>
    <circle cx="300" cy="30" r="1.5" fill="#fbbf24" filter="url(#emberGlow)" opacity="0.4"/>
    <circle cx="520" cy="50" r="1.8" fill="#f97316"/>
    <circle cx="520" cy="50" r="1.8" fill="#f97316" filter="url(#emberGlow)" opacity="0.4"/>
    <circle cx="680" cy="80" r="1.3" fill="#fcd34d"/>
    <circle cx="750" cy="140" r="1.5" fill="#fb923c"/>
    <circle cx="600" cy="25" r="1.2" fill="#fde68a"/>
    <circle cx="440" cy="15" r="1.6" fill="#fbbf24"/>
  </g>
</svg>
